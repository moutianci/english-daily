<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="English Daily">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📖</text></svg>"
<title>English Daily</title>
<style>
:root {
  --bg: #fafafa;
  --text: #1a1a1a;
  --text-light: #6b7280;
  --highlight: #2563eb;
  --highlight-bg: #dbeafe;
  --grammar-bg: #dcfce7;
  --grammar-border: #86efac;
  --translation-bg: #f0f4ff;
  --card-bg: #ffffff;
  --border: #e5e7eb;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 18px;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  /* Safe area insets for iOS notch/home indicator */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
}

.logo span { color: var(--highlight); }

.date-picker {
  position: relative;
}

.date-picker-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
}

.date-picker-dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 44px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  min-width: 180px;
  z-index: 100;
  max-height: 300px;
  overflow-y: auto;
}

.date-picker-dropdown.open { display: block; }

.date-option {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}

.date-option:last-child { border-bottom: none; }
.date-option:hover { background: var(--highlight-bg); }
.date-option.active { color: var(--highlight); font-weight: 600; }

/* Article Meta */
.article-meta {
  margin-bottom: 32px;
}

.article-meta .source {
  display: inline-block;
  background: var(--highlight);
  color: white;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 10px;
}

.article-meta .title {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 6px;
}
.article-meta .title-zh {
  font-size: 16px;
  font-weight: 400;
  color: #666;
  margin-bottom: 10px;
  line-height: 1.5;
}

.article-meta .date-text {
  color: var(--text-light);
  font-size: 14px;
}

/* Paragraphs */
.paragraph {
  margin-bottom: 36px;
}

.para-header {
  margin-bottom: 8px;
}

.play-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  background: var(--highlight-bg);
  border: 1px solid var(--highlight);
  border-radius: 20px;
  font-size: 13px;
  color: var(--highlight);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.play-btn:hover { background: #c5dafa; }
.play-btn.playing { background: var(--highlight); color: white; }
.play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.en-text {
  font-size: 19px;
  line-height: 1.9;
  color: var(--text);
}
  margin-left: 8px;
}

/* Vocabulary highlight */
.vocab-word {
  color: var(--highlight);
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.vocab-word:hover {
  background: var(--highlight-bg);
  border-radius: 3px;
  padding: 0 2px;
}

/* Translation */
.translation-toggle {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 14px;
  background: var(--translation-bg);
  border-radius: 6px;
  font-size: 14px;
  color: var(--highlight);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.translation-toggle:hover { background: #dce5ff; }

.translation-content {
  display: none;
  margin-top: 12px;
  padding: 16px 20px;
  background: var(--translation-bg);
  border-left: 3px solid var(--highlight);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 16px;
  line-height: 1.9;
  color: #374151;
}

.translation-content.show { display: block; }

/* Vocab Card */
.vocab-section {
  margin-top: 16px;
}

.vocab-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--highlight);
  margin-bottom: 8px;
}

.vocab-card {
  display: inline-block;
  margin: 4px 6px 4px 0;
  padding: 4px 10px;
  background: var(--highlight-bg);
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: var(--highlight);
  transition: all 0.15s;
}

.vocab-card:hover { background: #bfdbfe; }

.vocab-popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  padding: 24px;
  max-width: 400px;
  width: 90%;
  max-height: calc(100vh - 32px);
  max-height: calc(100dvh - 32px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  z-index: 200;
}

.vocab-popup.show { display: block; }

.vocab-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 199;
}

.vocab-overlay.show { display: block; }

.vocab-popup .close-btn {
  float: right;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-light);
}

.vocab-popup .word-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--highlight);
  margin-bottom: 4px;
}

.vocab-popup .phonetic {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 10px;
}

.vocab-popup .meaning {
  font-size: 16px;
  margin-bottom: 12px;
  line-height: 1.6;
}

.vocab-popup .vocab-derivatives {
  margin-top: 10px;
  padding: 8px 12px;
  background: #ecfdf5;
  border-left: 3px solid #10b981;
  border-radius: 0 6px 6px 0;
  font-size: 14px;
  color: #065f46;
  line-height: 1.6;
}
.vocab-popup .vocab-derivatives code {
  background: transparent;
  color: #065f46;
  font-size: 14px;
}

.chunk-fn {
  display: inline-block;
  padding: 2px 8px;
  background: #fde68a;
  color: #92400e;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 4px;
  flex-shrink: 0;
  white-space: nowrap;
}

.ds-pattern {
  margin-top: 6px;
  padding: 6px 10px;
  background: #ede9fe;
  border-left: 2px solid #8b5cf6;
  border-radius: 0 4px 4px 0;
  font-size: 13px;
  color: #5b21b6;
}
.ds-pattern code, .ds-note code {
  background: rgba(0,0,0,0.05);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 13px;
  font-family: 'SF Mono', Monaco, monospace;
}

.ds-note {
  margin-top: 4px;
  padding: 6px 10px;
  background: #fef3c7;
  border-left: 2px solid #f59e0b;
  border-radius: 0 4px 4px 0;
  font-size: 13px;
  color: #78350f;
  line-height: 1.6;
}

.ga-mistake code { color: #dc2626; background: #fee2e2; }
.ga-contrast { color: #1e40af; background: #dbeafe; border-left-color: #3b82f6; }

@media (max-width: 480px) {
  .chunk-fn { font-size: 10px; padding: 1px 6px; }
  .ds-pattern, .ds-note { font-size: 12px; }
}

.vocab-popup .example {
  font-size: 15px;
  color: #4b5563;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 6px;
  font-style: italic;
}

/* Difficult Sentences */
.grammar-section {
  margin-top: 16px;
}

.grammar-toggle {
  display: inline-block;
  padding: 6px 14px;
  background: var(--grammar-bg);
  border-radius: 6px;
  font-size: 14px;
  color: #166534;
  cursor: pointer;
  user-select: none;
}

.grammar-toggle:hover { background: #bbf7d0; }

.grammar-content {
  display: none;
  margin-top: 12px;
}

.grammar-item {
  padding: 14px 18px;
  background: var(--grammar-bg);
  border-left: 3px solid var(--grammar-border);
  border-radius: 0 var(--radius) var(--radius) 0;
  margin-bottom: 10px;
  font-size: 15px;
  line-height: 1.7;
}

.grammar-item:last-child { margin-bottom: 0; }

.grammar-item .en-sentence {
  color: var(--text);
  font-weight: 500;
  margin-bottom: 6px;
}

.grammar-item .zh-analysis { color: #374151; }
.grammar-item .grammar-point {
  margin-top: 6px;
  color: #166534;
  font-size: 14px;
}

/* Chunks (意群分析) */
.chunks-section {
  margin-top: 16px;
}

.chunks-toggle {
  display: inline-block;
  padding: 6px 14px;
  background: #fef3c7;
  border-radius: 6px;
  font-size: 14px;
  color: #92400e;
  cursor: pointer;
  user-select: none;
}

.chunks-toggle:hover { background: #fde68a; }

.chunks-content {
  display: none;
  flex-direction: column;
  gap: 6px;
  margin-top: 12px;
}

.chunk-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #fffbeb;
  border-left: 3px solid #f59e0b;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 15px;
  gap: 12px;
}

.chunk-en {
  font-weight: 500;
  color: var(--text);
  flex: 1;
}

.chunk-zh {
  color: #92400e;
  text-align: right;
  flex-shrink: 0;
}

@media (max-width: 480px) {
  .chunk-item { flex-direction: column; align-items: flex-start; gap: 2px; }
  .chunk-zh { text-align: left; }
}

/* Navigation */
.nav {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.nav-btn {
  padding: 10px 20px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 15px;
  color: var(--text);
  transition: all 0.15s;
}

.nav-btn:hover { background: var(--highlight-bg); border-color: var(--highlight); }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* No data */
.no-data {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}

.no-data .emoji { font-size: 48px; margin-bottom: 16px; }

/* Word lookup tooltip */
.word-tooltip {
  display: none;
  position: fixed;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  padding: 14px 18px;
  max-width: 320px;
  min-width: 180px;
  z-index: 300;
  font-size: 15px;
  line-height: 1.6;
  pointer-events: auto;
}

.word-tooltip.show { display: block; }

.word-tooltip .lookup-word {
  font-size: 18px;
  font-weight: 700;
  color: var(--highlight);
  margin-bottom: 4px;
}

.word-tooltip .lookup-phonetic {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 8px;
}

.word-tooltip .lookup-pos {
  display: inline-block;
  background: var(--highlight-bg);
  color: var(--highlight);
  font-size: 12px;
  font-weight: 600;
  padding: 1px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}

.word-tooltip .lookup-meaning {
  color: var(--text);
  margin-bottom: 6px;
}

.word-tooltip .lookup-loading {
  text-align: center;
  color: var(--text-light);
  padding: 8px 0;
}

.word-tooltip .lookup-error {
  color: #ef4444;
  font-size: 14px;
}

.word-tooltip .lookup-source {
  font-size: 11px;
  color: var(--text-light);
  text-align: right;
  margin-top: 8px;
}

/* Settings panel */
.settings-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s;
}
.settings-btn:hover { background: var(--highlight-bg); }

.settings-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 999;
}
.settings-overlay.show { display: block; }

.settings-panel {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card-bg);
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  z-index: 1000;
  width: min(360px, calc(100vw - 32px));
  max-height: 80vh;
  overflow-y: auto;
  padding: 28px;
}
.settings-panel.show { display: block; }
.settings-panel .close-btn {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 24px;
  color: var(--text-light);
  cursor: pointer;
  background: none;
  border: none;
}
.settings-panel h3 {
  font-size: 18px;
  margin: 0 0 20px 0;
  color: var(--text);
}
.settings-group {
  margin-bottom: 18px;
}
.settings-label {
  display: block;
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 6px;
}
.settings-val {
  color: var(--highlight);
  font-weight: 600;
}
.settings-panel select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card-bg);
  font-size: 14px;
  color: var(--text);
}
.settings-panel input[type="range"] {
  width: 100%;
  accent-color: var(--highlight);
}

.settings-confirm {
  display: block;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: var(--radius);
  background: var(--highlight);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: 4px;
}
.settings-confirm:hover { opacity: 0.85; }

/* Responsive */
@media (max-width: 640px) {
  body { font-size: 16px; }
  .container { padding: 16px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
  .article-meta .title { font-size: 22px; }
  .en-text { font-size: 17px; }
  .header { flex-wrap: wrap; gap: 10px; }
  .nav-btn { padding: 12px 16px; font-size: 14px; }
  .vocab-card { font-size: 13px; padding: 3px 8px; }
  .vocab-popup { width: 92%; padding: 18px; }
  .word-tooltip { max-width: 280px; min-width: 200px; font-size: 14px; }
  .word-tooltip .lookup-word { font-size: 16px; }
  .word-tooltip .lookup-phonetic { font-size: 12px; }
  .word-tooltip .lookup-meaning { font-size: 14px; }
}

/* Long-press workaround for iOS */
.en-text {
  -webkit-user-select: text;
  user-select: text;
  -webkit-touch-callout: none;
}

/* Prevent iOS zoom on input focus */
input, textarea, select {
  font-size: 16px !important;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">English<span>Daily</span></div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="date-picker">
        <button class="date-picker-btn" onclick="toggleDatePicker()" id="pickerBtn">📅 选择日期</button>
        <div class="date-picker-dropdown" id="pickerDropdown"></div>
      </div>
      <button class="settings-btn" onclick="toggleSettings()" id="settingsBtn" title="朗读设置">⚙️</button>
    </div>
  </div>

  <div id="content"></div>
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 上一篇</button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">下一篇 →</button>
  </div>
</div>

<!-- 朗读设置面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="close-btn" onclick="closeSettings()">×</button>
  <h3>🔊 朗读设置</h3>
  <div class="settings-group">
    <label class="settings-label" for="ttsEngine">朗读引擎</label>
    <select id="ttsEngine">
      <option value="browser">🎧 浏览器内置（推荐）</option>
    </select>
  </div>
  <div class="settings-group">
    <label class="settings-label">语速 <span class="settings-val" id="rateLabel">0.9</span></label>
    <input type="range" id="ttsRate" min="0.4" max="1.6" step="0.1" value="0.9"
      oninput="document.getElementById('rateLabel').textContent=this.value">
  </div>
  <div class="settings-group" id="voiceSelectGroup">
    <label class="settings-label" for="voiceSelect">语音</label>
    <div id="voiceHint" style="font-size:12px;color:#10b981;margin-bottom:6px;"></div>
    <select id="voiceSelect"></select>
  </div>
  <button class="settings-confirm" onclick="applySettings()">✓ 确认</button>
</div>

<div class="vocab-overlay" id="vocabOverlay" onclick="closeVocabPopup()"></div>
<div class="vocab-popup" id="vocabPopup">
  <button class="close-btn" onclick="closeVocabPopup()">×</button>
  <div id="vocabPopupContent"></div>
</div>

<!-- Floating word lookup tooltip -->
<div class="word-tooltip" id="wordTooltip"></div>

<script>
// 多源数据加载（国内访问 GitHub CDN 不稳定，依次尝试多个源）

// ===== 嵌入式全部文章数据（零网络请求，即时加载） =====
const EMBEDDED_ARTICLES = {

          {
            "word": "defining",

          },
          {

          {

            "meaning": "n. 前提；假设",
            "example": "The argument rests on a false premise."
          },
          {
            "word": "eventually",
            "phonetic": "/ɪˈventʃuəli/",
            "meaning": "adv. 最终；终于",
            "example": "She eventually found a job after months of searching."
          }
        ],
        "difficult_sentences": [
          {

      {
        "en": "Procrastination is not laziness. That distinction matters more than most people realise. Psychologists have spent decades studying why intelligent, capable individuals routinely postpone tasks they know are important — filing tax returns, starting exercise regimens, preparing for exams. The answer, it turns out, has less to do with poor time management and more to do with emotional regulation. When a task triggers anxiety, boredom or self-doubt, the brain seeks relief in the nearest available distraction.",

// 封装 fetch 带超时
async function fetchWithTimeout(url, ms = 5000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    return r;
  } catch {
    clearTimeout(t);
    return null;
  }
}

// 依次尝试所有源，成功即返回
async function fetchJSON(path) {
  const ts = Date.now();
  for (const base of SOURCES) {
    const r = await fetchWithTimeout(`${base}/${path}?_=${ts}`, 5000);
    if (r && r.ok) {
      try { return await r.json(); } catch { /* continue */ }
    }
  }
  return null;
}

function highlightVocab(text, vocabList) {
  let result = text;
  for (const v of vocabList) {
    const escaped = v.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\b(${escaped})\\b`, 'gi');
    result = result.replace(re, `<span class="vocab-word" onclick="event.stopPropagation(); showVocab(this)" data-word="${v.word}">$1</span>`);
  }
  return result;
}

function renderArticle(article) {
  if (!article) {
    document.getElementById('content').innerHTML = `

    return;

  let html = `
    <div class="article-meta">
      <div class="title">${article.title}</div>
      ${article.titleZh ? `<div class="title title-zh">${article.titleZh}</div>` : ''}
      <div class="date-text">📅 ${article.date}</div>
    </div>`;

  article.paragraphs.forEach((p, i) => {
    const enHighlighted = highlightVocab(p.en, p.vocabulary);
    html += `
    <div class="paragraph">
      <div class="para-header">
        <button class="play-btn" onclick="event.stopPropagation(); playParagraph(${i})" id="play-${i}">🔊 朗读</button>
      </div>
      <div class="en-text">${enHighlighted}</div>
      <div class="translation-toggle" onclick="toggleTranslation(${i})">📖 显示中文翻译</div>
      <div class="translation-content" id="trans-${i}">${p.zh}</div>`;

    // Vocab cards
    if (p.vocabulary.length) {
      html += `<div class="vocab-section"><div class="vocab-section-title">📝 重点词汇</div>`;
      for (const v of p.vocabulary) {
        html += `<span class="vocab-card" onclick='showVocabDetail(${JSON.stringify(v).replace(/'/g, "&#39;")})'>${v.word}</span>`;
      }
      html += `</div>`;
    }

    // Chunks (意群分析)
    if (p.chunks && p.chunks.length) {
      html += `<div class="chunks-section"><div class="chunks-toggle" onclick="toggleChunks(${i})">🔪 意群分析 (${p.chunks.length})</div>`;
      html += `<div class="chunks-content" id="chunks-${i}" style="display:none">`;
      for (const ck of p.chunks) {
        html += `<div class="chunk-item">
          <span class="chunk-en">${ck.en}</span>
          <span class="chunk-zh">${ck.zh}</span>
          ${ck.function ? `<span class="chunk-fn">${ck.function}</span>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Difficult sentences
    if (p.difficult_sentences.length) {
      html += `<div class="grammar-section"><div class="grammar-toggle" onclick="toggleGrammar(${i})">✏️ 难句解析 (${p.difficult_sentences.length})</div>`;
      html += `<div class="grammar-content" id="grammar-${i}" style="display:none">`;
      for (const s of p.difficult_sentences) {
        html += `<div class="grammar-item">
          <div class="en-sentence">${s.en}</div>
          <div class="zh-analysis">${s.zh}</div>
          <div class="grammar-point">📐 ${s.grammar}</div>
          ${s.pattern ? `<div class="ds-pattern">🔑 句型：<code>${s.pattern}</code></div>` : ''}
          ${s.note ? `<div class="ds-note">💡 ${s.note}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Overall grammar analysis (语法总析)
    if (p.grammar_analysis && p.grammar_analysis.points && p.grammar_analysis.points.length) {
      html += `<div class="grammar-section"><div class="grammar-toggle" onclick="toggleGrammarAnalysis(${i})">📐 语法总析 (${p.grammar_analysis.points.length})</div>`;
      html += `<div class="grammar-content" id="grammar-analysis-${i}" style="display:none;border-left-color:var(--accent2)">`;
      for (const pt of p.grammar_analysis.points) {
        html += `<div class="grammar-item">
          <div class="en-sentence">🔷 ${pt.structure}</div>
          <div class="zh-analysis">${pt.explanation}</div>
          <div class="grammar-point" style="background:var(--accent2-light)">💬 ${pt.example_sentence}</div>
          ${pt.common_mistake ? `<div class="ds-pattern ga-mistake">⚠️ 易错：<code>${pt.common_mistake}</code></div>` : ''}
          ${pt.contrast ? `<div class="ds-note ga-contrast">🔄 对比：${pt.contrast}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    html += `</div>`;
  });

  document.getElementById('content').innerHTML = html;
}

async function init() {
  await loadArticlesMap();
  allDates = await listDates();

  let hash = location.hash.slice(1);
  // Validate hash is a valid article ID
  const allIds = Object.values(articlesMap).flat().map(a => a.id);
  if (!allIds.includes(hash)) {
    hash = allDates[0] ? Object.values(articlesMap)[allDates.indexOf(allDates[0]) || 0]?.[0]?.id : '';
  }
  if (!hash) hash = allIds[0] || '';

  if (hash) {
    location.hash = hash;
    currentArticle = await loadArticle(hash);
    renderArticle(currentArticle);
    updateNav();
    const date = hash.replace(/[a-z]$/, '');
    document.getElementById('pickerBtn').textContent = `📅 ${date}`;
  }
}

function goToDate(date) {
  location.hash = date;
  document.getElementById('pickerDropdown').classList.remove('open');

function updateNav() {
  const allIds = Object.values(articlesMap).flat().map(a => a.id);
  const idx = allIds.indexOf(currentArticle?.date);
  document.getElementById('prevBtn').disabled = idx >= allIds.length - 1;

// ====== Word selection lookup ======
const tooltip = document.getElementById('wordTooltip');
let lookupTimeout = null;
let isTooltipVisible = false;
let lastRect = null;

function hideTooltip() {
  tooltip.classList.remove('show');
  isTooltipVisible = false;
  clearTimeout(lookupTimeout);
}

function positionTooltip(rect) {
  const pad = 8;
  // First show tooltip offscreen to measure its size
  tooltip.style.left = '0px';
  tooltip.style.top = '0px';
  tooltip.style.opacity = '0';
  tooltip.classList.add('show');
  // Force layout
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.opacity = '1';

  // Use the FIRST line of the selection rect for positioning
  // On iOS, rect.boundingClientRect may span multiple lines; use the bottom of the first line
  const sel = window.getSelection();
  let wordLeft = rect.left;
  let wordBottom = rect.bottom;
  let wordTop = rect.top;

  if (sel.rangeCount) {
    // Get client rects for the range (may span multiple lines)
    const rects = sel.getRangeAt(0).getClientRects();
    if (rects && rects.length > 0) {
      // Use the FIRST rect (first line of selection)
      const first = rects[0];
      wordLeft = first.left;
      wordBottom = first.bottom;
      wordTop = first.top;
    }
  }

  // Center horizontally under the word
  let left = wordLeft + (rect.width > 0 ? Math.min(rect.width, 60) : 30) / 2 - tw / 2;
  if (left < 8) left = 8;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;

  // Default: below the word
  let top = wordBottom + pad;

  // If tooltip would overflow bottom, show above the word
  if (top + th > window.innerHeight - 16) {
    top = wordTop - pad - th;
  }

  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
}

function getSelectedWord() {
  const sel = window.getSelection();
  const text = sel.toString().trim();
  if (!text || text.length < 2 || text.length > 40) return null;
  if (!/^[a-zA-Z\s'-]+$/.test(text)) return null;
  return text.toLowerCase().replace(/[^a-z\s'-]/g, '');
}

function getSelectionRect() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  if (range.collapsed) return null;
  return range.getBoundingClientRect();
}

function handleSelection() {
  const word = getSelectedWord();
  if (word) {
    const rect = getSelectionRect();
    if (rect) {
      lastRect = rect;
      isTooltipVisible = true;
      positionTooltip(rect);
    }
    clearTimeout(lookupTimeout);
    lookupTimeout = setTimeout(() => lookupWord(word), 200);
  } else {
    hideTooltip();
  }
}

// Desktop: mouseup
let lastSelText = '';
document.addEventListener('mouseup', (e) => {
  if (e.target.closest('.word-tooltip') || e.target.closest('.vocab-popup') || e.target.closest('.vocab-card') || e.target.closest('.vocab-word')) return;
  handleSelection();
});

async function lookupWord(word) {
  tooltip.innerHTML = '<div class="lookup-loading">🔍 查询中...</div>';

  const [dictResult, zhResult] = await Promise.allSettled([
    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`).then(r => r.ok ? r.json() : Promise.reject()),
    fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-CN`).then(r => r.ok ? r.json() : Promise.reject())
  ]);

  let html = `<div class="lookup-word">${word}</div>`;

  if (zhResult.status === 'fulfilled' && zhResult.value?.responseData?.translatedText) {
    const zhText = zhResult.value.responseData.translatedText;
    if (zhText && zhText !== word) {
      html += `<div style="font-size:17px;color:#dc2626;font-weight:600;margin-bottom:8px;">🀄 ${zhText}</div>`;
    }
  }

  if (dictResult.status === 'fulfilled' && dictResult.value) {
    const entry = dictResult.value[0];
    if (entry.phonetics?.length) {
      const ph = entry.phonetics.find(p => p.text) || entry.phonetics[0];
      if (ph?.text) html += `<div class="lookup-phonetic">${ph.text}</div>`;
    }
    const meanings = (entry.meanings || []).slice(0, 3);
    for (const m of meanings) {
      html += `<div class="lookup-pos">${m.partOfSpeech}</div>`;
      for (const def of m.definitions.slice(0, 2)) {
        html += `<div class="lookup-meaning">${def.definition}</div>`;
        if (def.example) {
          html += `<div style="color:#6b7280;font-style:italic;font-size:13px;margin-bottom:4px;">📝 ${def.example}</div>`;
        }
      }
    }
    const allSyns = entry.meanings?.flatMap(m => m.synonyms || []) || [];
    if (allSyns.length) {
      html += `<div style="margin-top:8px;font-size:13px;color:var(--text-light);">近义词: <span style="color:var(--highlight);">${allSyns.slice(0, 5).join(', ')}</span></div>`;
    }
  } else if (zhResult.status === 'rejected') {
    html += `<div class="lookup-error">未找到该词的释义</div>`;
  }

  html += `<div class="lookup-source">📖 MyMemory + dictionaryapi.dev</div>`;
  tooltip.innerHTML = html;
  // Reposition after content loaded (height may have changed)
  if (lastRect) {
    positionTooltip(lastRect);
  }
}

// iOS / touch / desktop: selectionchange is the single source of truth
// Tooltip shows when text is selected, hides when selection is cleared
document.addEventListener('selectionchange', () => {
  clearTimeout(lookupTimeout);
  lookupTimeout = setTimeout(() => {
    const word = getSelectedWord();
    if (word) {
      if (word !== lastSelText) {
        lastSelText = word;
        handleSelection();
      }
    } else {
      // Selection cleared → hide tooltip
      lastSelText = '';
      hideTooltip();
    }
  }, 300);
});

// On desktop: also check on mouseup for immediate response
document.addEventListener('mouseup', (e) => {
  if (e.target.closest('.word-tooltip') || e.target.closest('.vocab-popup') || e.target.closest('.vocab-card') || e.target.closest('.vocab-word')) return;
  // Use a tiny delay so the selection is finalized
  setTimeout(() => {
    const word = getSelectedWord();
    if (word) {
      if (word !== lastSelText) {
        lastSelText = word;
        handleSelection();
      }
    }
  }, 50);
});

// Re-position tooltip on scroll (keep visible, just reposition)
document.addEventListener('scroll', () => {
  if (isTooltipVisible) {
    const rect = getSelectionRect();
    if (rect) {
      positionTooltip(rect);
    } else {
      hideTooltip();
    }
  }
}, true);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideTooltip();
});

let currentAudio = null;
let currentPlayIndex = -1;

// TTS 配置
let ttsConfig = {
  engine: 'browser',
  rate: parseFloat(localStorage.getItem('tts_rate') || '0.9'),
  voiceName: localStorage.getItem('tts_voice') || ''
};

// 设置面板

// 引擎切换时显示/隐藏语音选择
// 语音质量评分：Neural > Enhanced > default；en-US > en-GB > 其他英文；女声优先（阅读体验更好）
function scoreVoice(v) {
  let s = 0;
  const n = v.name.toLowerCase();
  // 语音引擎类型
  if (/\bneural\b/.test(n)) s += 100;
  else if (/\benhanced\b/.test(n)) s += 50;
  // 语言/地区
  if (v.lang === 'en-US') s += 30;
  else if (v.lang === 'en-GB' || v.lang === 'en-AU') s += 20;
  else if (v.lang.startsWith('en')) s += 10;
  // 性别（名字里的线索）
  const femNames = ['samantha', 'victoria', 'karen', 'moira', 'tessa', 'fiona', 'vee', 'aria', 'zira', 'susan', 'danielle', 'heather', '初级'];
  const maleNames = ['dan', 'alex', 'james', 'john', 'michael', 'ian', 'ryan', 'guy', 'david'];
  if (femNames.some(f => n.includes(f))) s += 15;
  else if (maleNames.some(m => n.includes(m))) s -= 5;
  return s;
}

// 填充浏览器语音列表（按质量排序，最优语音自动选中）
function populateVoiceList() {
  const select = document.getElementById('voiceSelect');
  const voices = speechSynthesis.getVoices();
  if (!voices.length) { select.innerHTML = '<option>加载中...</option>'; return; }
  // 只列出英文语音，按质量排序
  const enVoices = voices
    .filter(v => v.lang.startsWith('en'))
    .sort((a, b) => scoreVoice(b) - scoreVoice(a));

  if (!enVoices.length) {
    select.innerHTML = '<option>无英文语音可用</option>';
    return;
  }

  // 质量标签
  function qualityLabel(v) {
    const n = v.name.toLowerCase();
    if (/\bneural\b/.test(n)) return '🧠';
    if (/\benhanced\b/.test(n)) return '✨';
    return '🔊';
  }

  select.innerHTML = enVoices.map(v =>
    `<option value="${v.name}" ${v.name === ttsConfig.voiceName ? 'selected' : ''}>${qualityLabel(v)} ${v.name} (${v.lang})</option>`
  ).join('');

  // 如果没有保存的语音，自动选最好的并显示名称
  if (!ttsConfig.voiceName && enVoices.length) {
    const best = enVoices[0];
    ttsConfig.voiceName = best.name;
    localStorage.setItem('tts_voice', best.name);
    select.value = best.name;
    // 更新面板提示
    const hint = document.getElementById('voiceHint');
    if (hint) hint.textContent = `已自动选择最佳语音：${best.name}`;
  }
}

// 点击确认时保存所有设置并关闭面板
function applySettings() {
  ttsConfig.rate = parseFloat(document.getElementById('ttsRate').value);
  ttsConfig.voiceName = document.getElementById('voiceSelect').value || ttsConfig.voiceName;
  localStorage.setItem('tts_rate', ttsConfig.rate);
  localStorage.setItem('tts_voice', ttsConfig.voiceName);
  closeSettings();
}

function playEdgeTTS(text, index, onDone) {
  // 微软 Edge TTS（通过 Hugging Face 免费 API，国内可访问）
  const apiUrl = 'https://fuliai-edgetts-api-openai.hf.space/v1/audio/speech';
  const btn = document.getElementById(`play-${index}`);
  if (btn) btn.textContent = '⏳ 加载中...';

  fetch(apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'tts-1',
      input: text,
      voice: 'en-US-JennyNeural',
      response_format: 'mp3',
      speed: ttsConfig.rate
    })
  })
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.blob();
  })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    currentPlayIndex = index;

    audio.onplay = () => {
      if (btn) { btn.classList.add('playing'); btn.textContent = '⏹ 停止'; }
    };
    audio.onended = () => {
      URL.revokeObjectURL(url);
      onDone();
    };
    audio.onerror = () => {
      console.warn('Edge TTS 播放失败，回退到浏览器 TTS');
      URL.revokeObjectURL(url);
      onDone();
      playBrowserTTS(text, index);
    };

    audio.play().catch(e => {
      console.warn('Edge TTS play 异常:', e);
      URL.revokeObjectURL(url);
      onDone();
      playBrowserTTS(text, index);
    });
  })
  .catch(err => {
    console.warn('Edge TTS API 请求失败:', err);
    onDone();
    playBrowserTTS(text, index);
  });
}

function playBrowserTTS(text, index) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = ttsConfig.rate;
  utter.pitch = 1.0;

  // 按用户选择的语音播放
  if (ttsConfig.voiceName) {
    const voices = speechSynthesis.getVoices();
    const matched = voices.find(v => v.name === ttsConfig.voiceName);
    if (matched) utter.voice = matched;
  }

  utter.onstart = () => {
    const btn = document.getElementById(`play-${index}`);
    if (btn) { btn.classList.add('playing'); btn.textContent = '⏹ 停止'; }
  };
  utter.onend = () => { resetPlayBtn(index); currentPlayIndex = -1; };
  utter.onerror = () => { resetPlayBtn(index); currentPlayIndex = -1; };

  currentAudio = utter;
  currentPlayIndex = index;
  speechSynthesis.speak(utter);
}

function playParagraph(index) {
  // 如果正在播放同一段，停止
  if (currentPlayIndex === index) {
    // 浏览器引擎
    if (speechSynthesis.speaking) speechSynthesis.cancel();
    // 在线引擎
    if (currentAudio && currentAudio.src) { currentAudio.pause(); currentAudio = null; }
    resetPlayBtn(index);
    currentPlayIndex = -1;
    return;
  }
  // 停止之前播放
  if (speechSynthesis.speaking) speechSynthesis.cancel();
  if (currentAudio && currentAudio.src) { currentAudio.pause(); currentAudio = null; }
  if (currentPlayIndex >= 0) resetPlayBtn(currentPlayIndex);

  const p = currentArticle?.paragraphs?.[index];
  if (!p) return;

  const btn = document.getElementById(`play-${index}`);
  currentPlayIndex = index;

  playBrowserTTS(p.en, index);
}

function resetPlayBtn(index) {
  const btn = document.getElementById(`play-${index}`);
  if (btn) { btn.classList.remove('playing'); btn.textContent = '🔊 朗读'; }
}

// 预加载语音列表（iOS需要）
speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); populateVoiceList(); };
speechSynthesis.getVoices();

// 语速滑条实时更新本地存储

if (rateSlider) {
  rateSlider.addEventListener('input', () => {
    ttsConfig.rate = parseFloat(rateSlider.value);
    localStorage.setItem('tts_rate', ttsConfig.rate);
  });
}
