name: Generate Daily Article

on:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间 0:00
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-generate.js

      - name: Commit and push
        run: |
          git config user.name "daily-bot"
          git config user.email "daily-bot[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "📚 $(date +%Y-%m-%d) daily article [auto]"
          git push
